<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Password Generator & Tracker</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary: #3b82f6;
            --text: #f8fafc;
            --accent: #10b981;
            --border: #334155;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .main-wrapper {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 440px;
        }

        .container {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 100%;
            box-sizing: border-box;
            border: 1px solid var(--border);
        }

        h2 {
            margin-top: 0;
            text-align: center;
            color: #fff;
            letter-spacing: 0.5px;
        }

        .result-container {
            background-color: #0f172a;
            padding: 1rem;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            border: 1px solid var(--border);
        }

        #password-display {
            font-family: monospace;
            font-size: 1.2rem;
            color: var(--accent);
            word-break: break-all;
            padding-right: 10px;
        }

        .copy-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s ease;
        }

        .copy-btn:hover { transform: scale(1.05); }

        .setting {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 1rem 0;
        }

        .strength-container {
            margin-top: 1.5rem;
            margin-bottom: 1.5rem;
            background: rgba(15, 23, 42, 0.6);
            padding: 12px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .strength-bar {
            height: 8px;
            width: 100%;
            background-color: var(--border);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 8px;
        }

        #strength-fill {
            height: 100%;
            width: 0%;
            transition: all 0.4s ease;
            background-color: #ef4444;
        }

        .generate-btn {
            width: 100%;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
            transition: all 0.2s;
        }

        .generate-btn:hover { transform: translateY(-2px); }

        .history-container {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 1.5rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            box-sizing: border-box;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .history-header h3 {
            margin: 0;
            font-size: 1.1rem;
            color: #fff;
        }

        .clear-btn {
            background: transparent;
            color: #ef4444;
            border: 1px solid #ef4444;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        .clear-btn:hover {
            background: #ef4444;
            color: white;
        }

        .history-list {
            max-height: 160px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-right: 5px;
        }

        .history-list::-webkit-scrollbar { width: 6px; }
        .history-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .history-item {
            background: #0f172a;
            border: 1px solid var(--border);
            padding: 10px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: monospace;
            font-size: 0.95rem;
        }

        .history-text {
            color: #cbd5e1;
            word-break: break-all;
            padding-right: 10px;
        }

        .history-copy {
            background: #334155;
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: bold;
        }

        .empty-history {
            color: #64748b;
            text-align: center;
            font-size: 0.9rem;
            padding: 20px 0;
            font-style: italic;
        }

        input[type="range"] { width: 60%; cursor: pointer; }
        input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="container">
            <h2>Password Generator</h2>
            
            <div class="result-container">
                <span id="password-display">Click Generate</span>
                <button class="copy-btn" id="copy-btn">Copy</button>
            </div>

            <div class="setting">
                <label>Length: <span id="length-val">12</span></label>
                <input type="range" id="length-slider" min="6" max="32" value="12">
            </div>

            <div class="setting">
                <label>Include Uppercase</label>
                <input type="checkbox" id="uppercase" checked>
            </div>

            <div class="setting">
                <label>Include Lowercase</label>
                <input type="checkbox" id="lowercase" checked>
            </div>

            <div class="setting">
                <label>Include Numbers</label>
                <input type="checkbox" id="numbers" checked>
            </div>

            <div class="setting">
                <label>Include Symbols</label>
                <input type="checkbox" id="symbols" checked>
            </div>

            <div class="strength-container">
                <div style="display:flex; justify-content:space-between; font-size: 0.85rem;">
                    <span>Estimated Crack Time:</span>
                    <span id="strength-text" style="font-weight:bold; color:#ef4444;">None</span>
                </div>
                <div class="strength-bar">
                    <div id="strength-fill"></div>
                </div>
            </div>

            <button class="generate-btn" id="generate-btn">Generate Password 🚀</button>
        </div>

        <div class="history-container">
            <div class="history-header">
                <h3>📜 Password History</h3>
                <button class="clear-btn" id="clear-btn">Clear Logs</button>
            </div>
            <div class="history-list" id="history-list">
                <div class="empty-history">No passwords generated yet.</div>
            </div>
        </div>
    </div>
