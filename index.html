<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Password Generator</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary: #3b82f6;
            --text: #f8fafc;
            --accent: #10b981;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
        }

        h2 {
            margin-top: 0;
            text-align: center;
            color: #fff;
            letter-spacing: 0.5px;
        }

        .result-container {
            background-color: #0f172a;
            padding: 1rem;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            border: 1px solid #334155;
            position: relative;
        }

        #password-display {
            font-family: monospace;
            font-size: 1.2rem;
            color: var(--accent);
            word-break: break-all;
            padding-right: 10px;
        }

        .copy-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s ease;
        }

        .copy-btn:hover {
            opacity: 0.9;
            transform: scale(1.05);
        }

        .copy-btn:active {
            transform: scale(0.95);
        }

        .setting {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 1rem 0;
        }

        .strength-container {
            margin-top: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .strength-bar {
            height: 8px;
            width: 100%;
            background-color: #334155;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 5px;
        }

        #strength-fill {
            height: 100%;
            width: 0%;
            transition: all 0.3s ease;
            background-color: #ef4444;
        }

        .generate-btn {
            width: 100%;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
            transition: all 0.2s;
        }

        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
        }

        input[type="range"] {
            width: 60%;
            cursor: pointer;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Password Generator</h2>
        
        <div class="result-container">
            <span id="password-display">Click Generate</span>
            <button class="copy-btn" id="copy-btn">Copy</button>
        </div>

        <div class="setting">
            <label>Length: <span id="length-val">12</span></label>
            <input type="range" id="length-slider" min="6" max="30" value="12">
        </div>

        <div class="setting">
            <label>Include Uppercase</label>
            <input type="checkbox" id="uppercase" checked>
        </div>

        <div class="setting">
            <label>Include Lowercase</label>
            <input type="checkbox" id="lowercase" checked>
        </div>

        <div class="setting">
            <label>Include Numbers</label>
            <input type="checkbox" id="numbers" checked>
        </div>

        <div class="setting">
            <label>Include Symbols</label>
            <input type="checkbox" id="symbols" checked>
        </div>

        <div class="strength-container">
            <div style="display:flex; justify-content:space-between; font-size: 0.85rem;">
                <span>Security Strength:</span>
                <span id="strength-text" style="font-weight:bold; color:#ef4444;">Weak</span>
            </div>
            <div class="strength-bar">
                <div id="strength-fill"></div>
            </div>
        </div>

        <button class="generate-btn" id="generate-btn">Generate Password</button>
    </div>

    <script>
        const display = document.getElementById('password-display');
        const copyBtn = document.getElementById('copy-btn');
        const lengthSlider = document.getElementById('length-slider');
        const lengthVal = document.getElementById('length-val');
        
        const uppercaseCheck = document.getElementById('uppercase');
        const lowercaseCheck = document.getElementById('lowercase');
        const numbersCheck = document.getElementById('numbers');
        const symbolsCheck = document.getElementById('symbols');
        
        const generateBtn = document.getElementById('generate-btn');
        const strengthFill = document.getElementById('strength-fill');
        const strengthText = document.getElementById('strength-text');

        const chars = {
            upper: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
            lower: 'abcdefghijklmnopqrstuvwxyz',
            number: '0123456789',
            symbol: '!@#$%^&*()_+~`|}{[]\:;?><,./-='
        };

        // Update length label dynamically
        lengthSlider.addEventListener('input', () => {
            lengthVal.textContent = lengthSlider.value;
        });

        // Main Generation Logic
        function generatePassword() {
            let pool = '';
            let typesCount = 0;
            
            if (uppercaseCheck.checked) { pool += chars.upper; typesCount++; }
            if (lowercaseCheck.checked) { pool += chars.lower; typesCount++; }
            if (numbersCheck.checked) { pool += chars.number; typesCount++; }
            if (symbolsCheck.checked) { pool += chars.symbol; typesCount++; }

            if (pool === '') {
                display.textContent = 'Select at least 1 option';
                updateStrength(0, 0);
                return;
            }

            let password = '';
            const length = parseInt(lengthSlider.value);

            for (let i = 0; i < length; i++) {
                const randomIndex = Math.floor(Math.random() * pool.length);
                password += pool[randomIndex];
            }

            display.textContent = password;
            updateStrength(length, typesCount);
        }

        // Live visual updates for the strength meter
        function updateStrength(length, typesCount) {
            let score = length * typesCount;
            
            if (score === 0) {
                strengthFill.style.width = '0%';
                strengthText.textContent = 'None';
            } else if (score < 20) {
                strengthFill.style.width = '33%';
                strengthFill.style.backgroundColor = '#ef4444'; // Red
                strengthText.textContent = 'Weak';
                strengthText.style.color = '#ef4444';
            } else if (score < 40) {
                strengthFill.style.width = '66%';
                strengthFill.style.backgroundColor = '#f59e0b'; // Orange
                strengthText.textContent = 'Medium';
                strengthText.style.color = '#f59e0b';
            } else {
                strengthFill.style.width = '100%';
                strengthFill.style.backgroundColor = '#10b981'; // Green
                strengthText.textContent = 'Strong';
                strengthText.style.color = '#10b981';
            }
        }

        // Clip-board Copying and UI feedback loop
        copyBtn.addEventListener('click', () => {
            const text = display.textContent;
            if (text === 'Click Generate' || text === 'Select at least 1 option') return;
            
            navigator.clipboard.writeText(text).then(() => {
                const originalText = copyBtn.textContent;
                copyBtn.textContent = 'Copied!';
                copyBtn.style.backgroundColor = '#10b981';
                
                setTimeout(() => {
                    copyBtn.textContent = originalText;
                    copyBtn.style.backgroundColor = '#3b82f6';
                }, 1500);
            });
        });

        generateBtn.addEventListener('click', generatePassword);
    </script>
</body>
</html>
